name: THAPI unit tests
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

env:
  SPACK_OPT: "--concurrent-packages 2 --show-log-on-error --fail-fast"
  CACHE_DIR: "${{ github.workspace }}/thapi_cache_${{ github.run_id }}"
  LLVM_VER: 18

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          concurrent_skipping: 'same_content'
          skip_after_successful_duplicate: 'true'
          paths_ignore: '["**/README.md"]'
          do_not_skip: '["pull_request"]'

  install_thapi_dependencies:
    needs: pre_job
    runs-on: ubuntu-latest
    name: Install thapi dependencies
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: ${{ inputs.debug_enabled }}
    - name: Checkout Thapi Deps (spack,...)
      uses: ./.github/actions/setup-thapi-deps
      with:
        cache-dir: ${{ env.CACHE_DIR }}
    - name: Install thapi dependencies
      run: |
        . external/spack/share/spack/setup-env.sh
        spack install --only dependencies $SPACK_OPT thapi ^ruby
    - name: Upload thapi build cache
      uses: actions/upload-artifact@v4
      with:
        name: thapi_cache
        include-hidden-files: true
        path: ${{ env.CACHE_DIR }}
        if-no-files-found: error
    - name: Block to allow inspecting failures
      run: sleep 30m
      if: ${{ failure() && inputs.debug_enabled }}

  install_thapi:
    strategy:
      matrix:
        version: ['thapi@0.0.7', 'thapi@0.0.8', 'thapi@0.0.9', 'thapi@0.0.10', 'thapi@0.0.11',
          'thapi@0.0.12', 'thapi@0.0.13', 'thapi@master', 'thapi@develop', 'thapi@develop+archive',
          'thapi@develop ^lttng-tools@master ^lttng-ust@master ^babeltrace2@master']
    needs: install_thapi_dependencies
    runs-on: ubuntu-latest
    name: Install ${{ matrix.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: ${{ inputs.debug_enabled }}
    - name: Download thapi build cache
      uses: actions/download-artifact@v4
      with:
        name: thapi_cache
        path: ${{ env.CACHE_DIR }}
    - name: Install clang for new parser
      run: |
        if [[ "${{ matrix.version }}" =~ ^thapi@(develop|master|0\.0\.13)* ]]; then
          # install llvm+clang
          sudo apt-get install libllvm${LLVM_VER} llvm-${LLVM_VER} llvm-${LLVM_VER}-dev
          sudo apt-get install libclang-${LLVM_VER}-dev python3-clang-${LLVM_VER}

          # Symlink python3-clang-${LLVM_VER} package to site-packages so h2yaml won't
          # fail on `import clang`. This way, our llvm+python trick will work without an
          # issue.
          python_major=$(python -c "import sys; print(f'{sys.version_info.major}')")
          python_minor=$(python -c "import sys; print(f'{sys.version_info.minor}')")
          SITE_PACKAGES=/usr/lib/python${python_major}.${python_minor}/site-packages
          sudo mkdir -p ${SITE_PACKAGES}
          sudo ln -s /usr/lib/python${python_major}/dist-packages/clang ${SITE_PACKAGES}/clang
        fi
    - name: Checkout Thapi Deps (spack,...)
      uses: ./.github/actions/setup-thapi-deps
      with:
        cache-dir: ${{ env.CACHE_DIR }}
    - name: Install ${{ matrix.version }}
      if: ${{ matrix.version != 'thapi@develop ^lttng-tools@master ^lttng-ust@master ^babeltrace2@master' }}
      run: |
        . external/spack/share/spack/setup-env.sh
        spack install $SPACK_OPT ${{ matrix.version }}
    - name: Install thapi@develop with master versions of dependencies
      if: ${{ matrix.version == 'thapi@develop ^lttng-tools@master ^lttng-ust@master ^babeltrace2@master' }}
      continue-on-error: true
      run: |
        . external/spack/share/spack/setup-env.sh
        spack install $SPACK_OPT ${{ matrix.version }} || true
    - name: Block to allow inspecting failures
      run: sleep 30m
      if: ${{ failure() && inputs.debug_enabled }}

  cleanup:
    needs: install_thapi
    if: always()
    runs-on: ubuntu-latest
    name: Cleanup the build cache
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: geekyeggo/delete-artifact@v5
      with:
        name: thapi_cache
