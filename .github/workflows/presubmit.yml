name: THAPI unit tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

env:
  SPACK_OPT: "--concurrent-packages 2 --show-log-on-error --fail-fast"
  CACHE_DIR: "${{ github.workspace }}/thapi_cache_${{ github.run_id }}"

jobs:
  install_thapi_dependencies:
    runs-on: ubuntu-latest
    name: Install thapi dependencies
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: ${{ inputs.debug_enabled }}
    - name: Checkout thapi dependencies (spack,...)
      uses: ./.github/actions/setup-thapi-deps
      with:
        cache-dir: ${{ env.CACHE_DIR }}
    - name: Install thapi dependencies
      run: |
        . external/spack/share/spack/setup-env.sh
        spack install --only dependencies $SPACK_OPT thapi@develop+clang-parser
    - name: Upload thapi build cache
      uses: actions/upload-artifact@v4
      with:
        name: thapi_cache
        include-hidden-files: true
        path: ${{ env.CACHE_DIR }}
        if-no-files-found: error
    - name: Block to allow inspecting failures
      run: sleep 120m
      if: ${{ failure() && inputs.debug_enabled }}

  install_thapi:
    strategy:
      matrix:
        version: ['thapi@0.0.7', 'thapi@0.0.8', 'thapi@0.0.9', 'thapi@0.0.10', 'thapi@0.0.11',
          'thapi@0.0.12', 'thapi@0.0.13', 'thapi@master', 'thapi@develop', 'thapi@develop+archive',
          'thapi@develop ^lttng-tools@master ^lttng-ust@master ^babeltrace2@master']
    needs: install_thapi_dependencies
    runs-on: ubuntu-latest
    name: Install ${{ matrix.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: ${{ inputs.debug_enabled }}
    - name: Download thapi build cache
      uses: actions/download-artifact@v4
      with:
        name: thapi_cache
        path: ${{ env.CACHE_DIR }}
    - name: Checkout thapi dependencies (spack,...)
      uses: ./.github/actions/setup-thapi-deps
      with:
        cache-dir: ${{ env.CACHE_DIR }}
    - name: Install ${{ matrix.version }}
      if: ${{ matrix.version != 'thapi@develop ^lttng-tools@master ^lttng-ust@master ^babeltrace2@master' }}
      run: |
        . external/spack/share/spack/setup-env.sh
        spack install $SPACK_OPT ${{ matrix.version }}
    - name: Install thapi@develop with master versions of dependencies
      if: ${{ matrix.version == 'thapi@develop ^lttng-tools@master ^lttng-ust@master ^babeltrace2@master' }}
      continue-on-error: true
      run: |
        . external/spack/share/spack/setup-env.sh
        spack install $SPACK_OPT ${{ matrix.version }} || true
    - name: Block to allow inspecting failures
      run: sleep 120m
      if: ${{ failure() && inputs.debug_enabled }}

  cleanup:
    needs: install_thapi
    if: always()
    runs-on: ubuntu-latest
    name: Cleanup the build cache
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: geekyeggo/delete-artifact@v5
      with:
        name: thapi_cache
